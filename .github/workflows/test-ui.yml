# Storybook / Vitest UI tests (component tests from stories).
# See: https://storybook.js.org/docs/writing-tests/in-ci
name: UI Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      # Playwright image must match package.json playwright version (1.58.x)
      # so browser paths (chrome-headless-shell) match. See: https://playwright.dev/docs/docker
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm ci

      - name: Run Storybook tests
        run: npm run test-storybook
